name: nfx-vault

services:
  # 统一后端（HTTP + Kafka Consumer + 定时任务），代码目录: backend/
  backend-api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: NFX-Vault-Backend
    restart: always
    ports:
      # host:host_port:container_port（两段式只能是 port:port，不能写 IP）
      - "${BACKEND_HOST}:${BACKEND_PORT}:8000"
    volumes:
      - ${CERTS_DIR}:${CERTS_DIR}:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${ACME_CHALLENGE_DIR}:${ACME_CHALLENGE_DIR}:rw
    environment:
      - PYTHONUNBUFFERED=1
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_DATABASE_PORT=${MYSQL_DATABASE_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_USERNAME=${MYSQL_ROOT_USERNAME}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_DATABASE_PORT=${REDIS_DATABASE_PORT}
      - REDIS_DB=${REDIS_DB}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_CACHE_TTL=${REDIS_CACHE_TTL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_EVENT_TOPIC=${KAFKA_EVENT_TOPIC}
      - KAFKA_EVENT_POISON_TOPIC=${KAFKA_EVENT_POISON_TOPIC}
      - KAFKA_CONSUMER_GROUP_ID=${KAFKA_CONSUMER_GROUP_ID}
      - CERT_MAX_WAIT_TIME=${CERT_MAX_WAIT_TIME}
      - ACME_CHALLENGE_DIR=${ACME_CHALLENGE_DIR}
      - CERTS_DIR=${CERTS_DIR}
      - READ_ON_STARTUP=${READ_ON_STARTUP}
      - SCHEDULE_ENABLED=${SCHEDULE_ENABLED}
    labels:
      - traefik.enable=true
    networks:
      - nfx-vault
      - nfx-edge

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/vault}
    container_name: NFX-Vault-Frontend
    restart: always
    ports:
      - "${FRONTEND_HOST}:${FRONTEND_PORT}:80"
    networks:
      - nfx-vault
    depends_on:
      - backend-api

networks:
  nfx-vault:
    name: nfx-vault
    driver: bridge
  nfx-edge:
    external: true
    name: nfx-edge
